[mqtt]
# MQTT broker configuration
host = mqtt.joshoberhaus.com
port = 1883
topic = cycling/power
keepalive = 60
client_id = brightness_from_mqtt
# mode = power        (default) brightness tracks power output
# mode = heart_rate   brightness tracks HR zone; power topic ignored
# mode = combined     power drives brightness, HR overrides when out of zone
mode = power

[brightness]
# Brightness mapping settings
max_power = 110
min_brightness = 2
max_brightness = 100
# brightness = slope * power + intercept (when power <= max_power)
slope = 1.25
intercept = -25

[heart_rate]
# Required when mode = heart_rate or combined
topic = auuki/heartRate
min_bpm = 115
max_bpm = 145
in_zone_brightness = 100
out_of_zone_brightness = 5
